<!DOCTYPE html>
<html>
    <head>
        <title>Colspan_Rowspan Example</title>
    </head>
    <body>
        <table border="none" align="center">
            <tr style="background-color: rgb(243, 134, 134);">
                <th colspan="5">Room Tarrif</th>
            </tr>
            <tr style="background-color: rgb(135, 241, 151);">
                <td rowspan="3">Room Type</td>
                <td colspan="2">Deluxe</td>
                <td colspan="2">Excutive</td>
            </tr>
            <tr style="background-color: rgb(124, 207, 231);">
                <td>AC</td>
                <td>Non-AC</td>
                <td>AC</td>
                <td>Non-Ac</td>
            </tr>
            <tr style="background-color: rgb(230, 149, 241);">
                <td>1500</td>
                <td>2000</td>
                <td>2500</td>
                <td>1500</td>
            </tr>
        </table>
    </body>
</html>
