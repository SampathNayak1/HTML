<html>
    <head>
        <title>Student Marks</title>
    </head>
    <body>
        <h1> <u>Student Marks</u></h1>
        <label >Enter Marks : </label>
        <input type="number" id="marks" > <br><br>
        <button onclick="StuMarks()">Get Result</button>
         <h1 id="result"></h1> 

         <script>
            function StuMarks(){
                Smake=Number(document.getElementById("marks").value) 
                
                if(Smake >= 90)
            {
                document.getElementById("result").innerHTML =
                "Grade A+";
            }

            else if(Smake >= 75)
            {
                document.getElementById("result").innerHTML =
                "Grade A";
            }

            else if(Smake >= 60)
            {
                document.getElementById("result").innerHTML =
                "Grade B";
            }

            else if(Smake >= 35)
            {
                document.getElementById("result").innerHTML =
                "Pass";
            }

            else
            {
                document.getElementById("result").innerHTML =
                "Fail";
            }
            }
         </script>
    </body>
</html>
