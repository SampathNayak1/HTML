<html>
    <head>
        <title>Colspan_Rowspan_Exaple</title>
    </head>
    <body>
        <table border="none" >
            <tr style="background-color: rgb(218, 85, 85);">
                <th colspan="5">Student Marks</th>
            </tr>
            <tr style="background-color: rgb(233, 159, 68);">
                <Th>Rollno.</Th>
                <th>Name</th>
                <th>Class</th>
                <th>Marks(English)</th>
                <th>Marks(Maths)</th>
            </tr>
            <tr style="background-color: rgb(223, 151, 151);">
                <td>1</td>
                <td>Joe</td>
                <td>3rd</td>
                <td colspan="2">30</td>
            </tr>
            <tr style="background-color: rgb(220, 111, 240);">
                <td>2</td>
                <td>Nick</td>
                <td rowspan="2">4th</td>
                <td>45</td>
                <td>30</td>
            </tr>
            <tr style="background-color: rgb(112, 218, 242);">
                <td>3</td>
                <td>Priyanka</td>
                <td>40</td>
                <td>50</td>
            </tr>
        </table>
    </body>
</html>
