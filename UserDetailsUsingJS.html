<html>
    <head>
        <title>
            User Details 
        </title>
        <style>
            body{
                 display: flex;
                 justify-content: center;
                 align-items: center;
                 margin: 0;
                 background-color: lightgray;
            }
            #form{
                background-color: antiquewhite;
                border: 1px solid black;
                border-radius: 5px;
                width: 500px;
                text-align: center;
                justify-content: center;
            }
        </style>
    </head>
    <body>
        <form id="form">
            <h1>User Registation Form</h1>
            <label >First Name :</label>
            <input type="text" id="firstname"><br><br>
            
            <label >Last Name :</label>
            <input type="text" id="lastname"><br><br>

            <label>Gender :</label>
            <input type="radio" id="Rmale" value="gender">Male 
            <input type="radio" id="Rfemale" value="gender">Female <br><br>

             <label >Hobbies :</label>
             <input type="checkbox" id="reading" value="Reading" >Reading  
             <input type="checkbox" id="playing" value="Playing" >Playing  
             <input type="checkbox" id="movies" value="Movies" >Movies  <br><br>

            <label >Gmail :</label>
            <input type="email" id="gmail"> <br><br>

            <label >Mobile No : </label>
            <input type="number" id="number"><br><br>

            <label >City :</label>
            <select id="city">
                <option >Hyderabad</option>
                <option >Banglore</option>
                <option >Mumbai</option>
            </select><br><br>

            <label >Address :</label>
            <textarea id="address" cols="10" rows="3" wrap="off"></textarea> <br><br>

            <input type="button" value="Submit" onclick="showDetails()">
            <br><br>

            <p id="dispaly"></p>


        </form>

        <script>
           function showDetails(){
                 FirstName=document.getElementById("firstname").value; 
                 LastName=document.getElementById("lastname").value;
                 Email=document.getElementById("gmail").value;
                 PhoneNo=document.getElementById("number").value;
                 City=document.getElementById("city").value;
                 Address=document.getElementById("address").value;

                 Gender="";
                 if(document.getElementById("Rmale").checked)
                 {
                    Gender="Male"; 
                 } 
                 else if(document.getElementById("Rfemale").checked){
                    Gender="Female";
                 }

                 Hobbies="";
                 if(document.getElementById("reading").checked){
                    Hobbies +="Reading";
                 }
                 else if(document.getElementById("playing").checked){
                    Hobbies += "Playing";
                 }
                 else if(document.getElementById("movies").checked){
                    Hobbies +="Movies";
                 }

                 
                document.getElementById("dispaly").innerHTML="First Name : "+FirstName+"<br>"+
                "Second Name : "+LastName+"<br>"+"Gender : "+Gender+"<br>"+"Hobbies : "+Hobbies+"<br> "+"Gmail : "+Email+" <br>"+"Mobile No : "+PhoneNo+"<br>"+"City : "+City+ "<br>"+"Address : " +Address ; 

            }
           
        </script>
    </body>
</html>
