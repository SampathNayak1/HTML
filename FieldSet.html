<html>
    <head>
        <title>FieldSet Example </title>
    </head>
    <body>
        <form>
                 <h1><u>Job Application Form</u></h1>

            <fieldset style="background-color: antiquewhite;">
                <legend><h2>Personal Details</h2></legend>
              <label>First Name : </label>
              <input type="text"><br><br> 

              <label>Last Name : </label>
              <input type="text"><br><br>

              <label>Date of Birth :</label>
              <input type="date"><br><br>

              <label>Gender : </label> 
              <input type="radio" name="gender" >Male 
              <input type="radio" name="gender">Female <br><br>

              <label>Father Name : </label>
              <input type="text"><br><br>

              <label>Mobile No : </label>
              <input type="number"><br><br>

              <label> Gmail : </label>
              <input type="email"><br><br>
                
              <label>Address :</label>
              <textarea rows="5" cols="20" wrap="off"></textarea> 
            </fieldset>

           <fieldset style="background-color: azure;">
            <legend><h2>Educational Details</h2></legend>
            
            <h3>SSC Details</h3>
            <label>School Name : </label>
            <input type="text"><br><br>
            
            <label>Percentage of Marks : </label>
            <input type="number"><br><br>

            <label>Passout Year : </label>
            <input type="date"> <br><br> 
            <hr>

             <h3>Intermediate Details</h3>
            <label>College Name : </label>
            <input type="text"><br><br>

            <label>Group Name :</label>
            <input type="text"><br><br>
            
            <label>Percentage of Marks : </label>
            <input type="number"><br><br>

            <label>Passout Year : </label>
            <input type="date"> <br><br> 
            <hr>

             <h3>Graduation Details</h3>
            <label>College Name : </label>
            <input type="text"><br><br>

            <label>Group Name :</label>
            <input type="text"><br><br>
            
            <label>Percentage of Marks : </label>
            <input type="number"><br><br>

            <label>Passout Year : </label>
            <input type="date"> <br><br> 
            <hr>

             <h3>PostGraduation Details</h3>
            <label>PG College Name : </label>
            <input type="text"><br><br>

            <label>PG Group Name :</label>
            <input type="text"><br><br>
            
            <label>PG Percentage of Marks : </label>
            <input type="number"><br><br>

            <label>PG Passout Year : </label>
            <input type="date"> <br><br> 
 
           </fieldset>

           <fieldset style="background-color: blanchedalmond;">
            <legend> <h2>Experiance Details</h2> </legend>
             <label>Job Type : </label>
             <input type="text"><br><br>

             <label>Rols & Responsibilities : </label>
              <textarea wrap="off"></textarea><br><br>

              <label>Company Name : </label>
              <input type="text"><br><br>

              <label>Compnay Address : </label>
              <input type="text"><br><br>

              <label >No of years of experiance : </label>
              <input type="number"><br><br>

              <label>Last CTC :</label>
              <input type="number"><br><br>

              <label>Expected CTC : </label>
              <input type="number"><br><br>
              
              <label>Prefferd Working Location </label>
              <input type="text">
            <h3></h3>
           </fieldset>
           <br>

           <button>Submit</button>  
           <button>Reset</button>
        </form>
    </body>
</html>
