<html>
    <head>
        <title>For Loop Example</title>
    </head>
    
    <body style="background-color: antiquewhite;">
        <h1 style="color: red;"> <u>ForLoop Example</u></h1>
        <p id="display" style="color: blue;"></p>
        <script>
            Show=""
            for(let i=10;i>=1 ;i-- ){
               Show=Show+i+". Welcome"+"<br>" 
                document.getElementById("display").innerHTML=Show;
            }
        </script>
    </body>
</html>
