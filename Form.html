<html>
    <head>
        <title>
            Form Controls
        </title>
    </head>
    <body>
        <h1><u>Form Controls</u> </h1>

        <label>Enter your Name</label>
        <input type="text"> <br>

        <label>Gender</label><br>
        <input type="radio" name="Gender">Male
        <input type="radio" name="Gender">Female <br>

        DOB : <input type="date">
        <br>

        <label>Hobbies</label>
        <input type="checkbox">Reading <br>
        <input type="checkbox">Writing <br>
        <input type="checkbox">Movies <br>
        <input type="checkbox">Playing<br>

        <label>Address</label>
        <textarea rows="4" cols="10" ></textarea><br>
        
         <select>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Canada</option> 
         </select>
         <br>
         <input type="submit" value="button">
    </body>
</html>
