<html>
    <head>
        <title>Switch Case </title>
    </head>
    <body>
        <h1><u>Switch case</u></h1>
        <label style="color: red;">Enter A day Number : </label>
        <input type="number" id="num1"><br><br>
        <button onclick="Check()" style="background-color: antiquewhite;">Check</button>
        <h1 id="result" style="background-color: aquamarine;"></h1>
        
        <script>
            function Check(){
                num=Number(num1.value)

                switch(num) {
                    case 1: 
                        document.getElementById("result").innerHTML="Monday"
                         break;  
                    case 2:
                        document.getElementById("result").innerHTML="Tuesday"
                        break;
                    case 3:
                        document.getElementById("result").innerHTML="Wednesday"
                        break;
                    case 4:
                        document.getElementById("result").innerHTML="Thruesday"
                        break;
                    case 5:
                        document.getElementById("result").innerHTML="Friday"
                        break;
                    case 6:
                        document.getElementById("result").innerHTML="Saturady"
                        break;
                    case 7:
                        document.getElementById("result").innerHTML="Sunday"
                        break;
                    default:   
                        document.getElementById("result").innerHTML="Enter valid day number!!!"                       
                }   
            }
        </script>

    </body>
</html>
