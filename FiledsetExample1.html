<!DOCTYPE html>
<html>
<head>
    <title>Transport Address</title>

    <style>
          body{
            font-family: Arial;
            background-color: rgb(221, 231, 161);
        }  
 
         
    </style>
</head>

<body>

    <form >
        
        <h1 align="center"><img src="D:\HTML\images.jpg" style="width: 100px; height: 50px;" align="center"><u>Transport Address Form</u> </h1>
            
        <fieldset align="center">
            <legend><h2>Shipping Address</h2></legend>

            <label>Shipping Name :</label>
            <input type="text"><br><br>

            <label>Street :</label>
            <input type="text"><br><br>

            <label>City :</label>
            <input type="text"><br><br>

            <label>State :</label>
            <input type="text"><br><br>

            <label>Pincode :</label>
            <input type="number"><br><br>

            <label>Country :</label>
            <select>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
                <option>Canada</option>
            </select><br><br>

            <label>Phone Number :</label>
            <input type="tel"><br><br>

            <label>Email :</label>
            <input type="email"><br><br>

            <label>Delivery Date :</label>
            <input type="date"><br><br>

            <label>Address Details :</label>
            <textarea rows="4"></textarea>
        </fieldset>

      
        <fieldset align="center">
            <legend><h2>Billing Address</h2></legend>

            <label>Billing Name :</label>
            <input type="text"><br><br>

            <label>Street :</label>
            <input type="text"><br><br>

            <label>City :</label>
            <input type="text"><br><br>

            <label>State :</label>
            <input type="text"><br><br>

            <label>Pincode :</label>
            <input type="number"><br><br>

            <label>GST Number :</label>
            <input type="text"><br><br>

            <label>Payment Method :</label>
            <select>
                <option>Cash</option>
                <option>UPI</option>
                <option>Credit Card</option>
                <option>Debit Card</option>
            </select><br><br>

            <label>Card Number :</label>
            <input type="text"><br><br>

            <label>Comments :</label>
            <textarea rows="4"></textarea>
        </fieldset>

        <center>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </center>

    </form>

</body>
</html>
